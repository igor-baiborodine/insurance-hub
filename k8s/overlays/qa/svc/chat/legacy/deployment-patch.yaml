apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api-legacy
spec:
  template:
    spec:
      containers:
        - name: chat-api-legacy
          image: ghcr.io/igor-baiborodine/insurance-hub/chat-api-legacy:0.1.0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
