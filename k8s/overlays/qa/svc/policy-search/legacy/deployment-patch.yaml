apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-search-api-legacy
spec:
  template:
    spec:
      containers:
        - name: policy-search-api-legacy
          image: ghcr.io/igor-baiborodine/insurance-hub/policy-search-api-legacy:1.0.0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          env:
            # Elasticsearch sensitive data from QA secret
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qa-elasticsearch-es-elastic-user
                  key: elastic