apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api-legacy
spec:
  template:
    spec:
      containers:
        - name: product-api-legacy
          image: ghcr.io/igor-baiborodine/insurance-hub/product-api-legacy:1.4.0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          env:
            # Postgres sensitive data
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: qa-postgres-product-user-creds
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qa-postgres-product-user-creds
                  key: password
