apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: qa-svc
namePrefix: qa-
labels:
  - includeSelectors: true
    pairs:
      environment: qa
resources:
  - ../../../../../apps/svc/product/base/legacy
patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: product-api-legacy
configMapGenerator:
  - name: product-config-legacy
    behavior: merge
    literals:
      - PG_HOST=qa-postgres-product-rw.qa-data.svc.cluster.local
      - TRACING_ZIPKIN_ENABLED=true
      - ZIPKIN_HOST=qa-alloy.qa-monitoring.svc.cluster.local
