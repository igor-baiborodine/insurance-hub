micronaut:
  application:
    name: product-service
  server:
    host: localhost
    port: 8080
#  metrics:
#    enabled: true
---
jackson:
  bean-introspection-module: true
---
mongodb:
    uri: "mongodb://${MG_USER:product}:${MG_PASSWORD:product}@${MG_HOST:localhost}:${MG_PORT:27017}/products-demo"
    cluster:
      maxWaitQueueSize: 5
    connectionPool:
      maxSize: 20
---
products:
  persistence: ${PRODUCTS_PERSISTENCE:postgres}
---
postgres:
  host: ${PG_HOST:localhost}
  port: ${PG_PORT:5432}
  database: ${PG_DBNAME:product}
  username: ${PG_USER:product}
  password: ${PG_PASSWORD:product}
  ssl: ${PG_SSL:false}
---
# This is only to allow Micronaut to bootstrap DataSource;
# overridden at runtime by PostgresDatasourceConfigurationListener#onCreated(BeanCreatedEvent<DatasourceConfiguration>)
datasources:
  default:
    driverClassName: org.postgresql.Driver
    url: "jdbc:postgresql://localhost:5432/product"
    username: ${PG_USER:product}
    password: ${PG_PASSWORD:product}
---
jpa:
  default:
    packages-to-scan:
      - 'pl.altkom.asc.lab.micronaut.poc.product.service.infrastructure.adapters.db.model'
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
---
endpoints:
  health:
    enabled: true
    sensitive: false
    details-visible: ANONYMOUS
  env:
    enabled: false
    sensitive: false
#  metrics:
#    enabled: true
#    sensitive: false
---
tracing:
  zipkin:
    enabled: true
    http:
      url: "http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}"
      sampler:
        probability: 1.0 # Configuration taking 100% of the request to be processed by Zipkin. In a real production system, that could be overwhelming.
