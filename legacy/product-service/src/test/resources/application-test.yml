micronaut:
  server:
    port: -1
---
datasources:
  default:
    initialization-fail-timeout: -1
---
jpa:
  default:
    enabled: true
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        temp:
          use_jdbc_metadata_defaults: false
---
products:
  persistence: postgres
---
tracing:
  zipkin:
    enabled: false
